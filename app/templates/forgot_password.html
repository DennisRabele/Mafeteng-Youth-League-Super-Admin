{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
  <form class="form-card compact" method="post" action="/forgot-password">
    <h1>Password Recovery</h1>
    <p style="color: #666; margin-bottom: 20px;">Enter your email address to receive a password recovery code.</p>
    {% if message %}<p class="alert success">{{ message }}</p>{% endif %}
    {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
    <label>Email Address
      <input name="email" type="email" required autocomplete="email">
    </label>
    <button class="button button-primary" type="submit">Send Recovery Code</button>
    <a class="form-link" href="/login">Back to Login</a>
  </form>
</section>
{% endblock %}
