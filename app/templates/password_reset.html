{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
  <form class="form-card compact" method="post" action="/password-reset">
    <h1>Reset Password</h1>
    <p style="color: #666; margin-bottom: 20px;">Enter your password recovery code and new password.</p>
    {% if message %}<p class="alert success">{{ message }}</p>{% endif %}
    {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
    <label>Recovery Code
      <input name="one_time_code" type="text" required placeholder="Enter code from email">
    </label>
    <label>New Password
      <input name="new_password" type="password" required minlength="8" autocomplete="new-password">
    </label>
    <label>Confirm Password
      <input name="confirm_password" type="password" required minlength="8" autocomplete="new-password">
    </label>
    <button class="button button-primary" type="submit">Reset Password</button>
    <a class="form-link" href="/login">Back to Login</a>
  </form>
</section>
{% endblock %}
